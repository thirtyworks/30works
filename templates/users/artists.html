{% extends "base.html" %}
{% block content %}
<style>
    #select,#select2{
  display: none !important;
}
</style>
<div class="container mt-5">
    <div class="table-responsive">
        <table class="table table-bordered">
          <thead>
              <tr class="text-center">
              <th>Username</th>
            </tr>
          </thead>
          <tbody>
            {% for key, values in artists.items %}
               <tr class="text-center">
                   <td><a href="/artist/{{key}}">{{values}}</a></td>
               </tr>
             {% endfor %}
          </tbody>
        </table>
    </div>

</div>
{% endblock %}
