{% extends "base.html" %}
{% block content %}
{% load static %}
<style>
    #select,#select2{
  display: none !important;
}

</style>
<div class="container my-5">
  <div class="super-header">
    <h1>Meet the Artists</h1>
    <hr>
  </div>
  <div class="row artist-cards">
    {% for artist in artists %}
    <div class="artist-card col-sm-6 col-md-6 col-lg-4">
      <div class="card">
        <div class="card-body">
          <img src="{{artist.user_profile.profilepic.url}}" class="float-left rounded-circle">
          <div class="message">
            <h5 class="card-title">{{artist.first_name|title }} {{artist.last_name|title }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{artist.username }}</h6>
            <div class="actions">
              <a href="{% url 'user-posts' artist.user_profile.acount_id %}" class="card-link">View Works</a>
            </div>
          </div>
        </div>
      </div>        
    </div>
    {% endfor %} 
  </div>
</div>
{% endblock %}
